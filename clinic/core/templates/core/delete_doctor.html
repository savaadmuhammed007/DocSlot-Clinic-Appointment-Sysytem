{% extends 'core/base.html' %}

{% block content %}
<div class="card form-card">
    <h2>Delete Doctor</h2>
    <p>Are you sure you want to delete <strong>Dr. {{ doctor.user.get_full_name }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-small danger">Yes, Delete</button>
        <a href="{% url 'manage_doctors' %}" class="btn-small">Cancel</a>
    </form>
</div>
{% endblock %}
