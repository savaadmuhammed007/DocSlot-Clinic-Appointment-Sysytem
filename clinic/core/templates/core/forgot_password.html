{% extends 'core/base.html' %}

{% block content %}
<div class="container">
    <h2>Forgot Password</h2>
    <p>Enter your registered email address to receive a password reset link.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Send Reset Link</button>
    </form>
</div>
{% endblock %}
