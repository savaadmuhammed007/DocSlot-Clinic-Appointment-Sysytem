{% extends 'core/base.html' %}

{% block content %}
<div class="card form-card">
    <h2>Reschedule Appointment</h2>
    <p><strong>Doctor:</strong> Dr. {{ appointment.doctor.user.get_full_name }}</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Update Appointment</button>
    </form>
</div>
{% endblock %}
